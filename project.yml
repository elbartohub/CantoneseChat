name: CantoneseVoiceChat
options:
  # 預設用 com.example (Apple reserve 咗, 落 device 會 reject)
  # 落真機前改做你自己 prefix, e.g. com.peter (跟 Apple Developer 上 Team ID)
  bundleIdPrefix: com.peter
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hant
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    INFOPLIST_FILE: CantoneseVoiceChat/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.peter.CantoneseVoiceChat
    # === Deployment 配置 ===
    # 落 real device 之前:
    #   1. Apple ID 加咗喺 Xcode → Settings → Accounts (Personal Team OK)
    #   2. 改下面 DEVELOPMENT_TEAM 做你個 Team ID (10-char alphanumeric, 喺
    #      https://developer.apple.com/account → Membership 搵)
    #   3. 改 PRODUCT_BUNDLE_IDENTIFIER prefix 由 "com.example" 做你自己
    #      (例 "com.peter.CantoneseVoiceChat") 避免撞 Apple 預設 ID
    DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
    CODE_SIGN_STYLE: Automatic
    # 真機 ATS 對 arbitrary IP / .local hostnames 要明確放行
    # 喺 Info.plist NSAppTransportSecurity.NSExceptionDomains 加埋 *.local
targets:
  CantoneseVoiceChat:
    type: application
    platform: iOS
    sources:
      - path: CantoneseVoiceChat
        excludes:
          - "Resources/Info.plist"
    resources:
      - CantoneseVoiceChat/Resources/Assets.xcassets
      - CantoneseVoiceChat/Resources/SampleAudio
      - CantoneseVoiceChat/Resources/LaunchScreen.storyboard
    info:
      path: CantoneseVoiceChat/Resources/Info.plist
      properties:
        # (v0.7.8+) 用 LaunchScreen.storyboard 而唔係 UILaunchScreen dict
        # 可以顯示 brand mark (「廣」字) + 標題 + tagline
        UILaunchStoryboardName: LaunchScreen
        NSMicrophoneUsageDescription: "用嚟錄你嘅廣東話，傳去 MiniMax cloud 辨識。"
        # (v0.7.8+) Proxy mode 取消, iPhone 直接 hit api.minimax.io (公網 HTTPS)
        # - 唔需要 NSAllowsArbitraryLoads / NSAllowsLocalNetworking / *.local exceptions
        # - 唔需要 NSBonjourServices (冇 LAN service discovery)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false  # HTTPS only by default
        # 保留 microphone permission (STT 仍用 iOS on-device zh-HK)
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES

schemes:
  CantoneseVoiceChat:
    build:
      targets:
        CantoneseVoiceChat: all
    # 真機 run profile — auto-detect 駁住 USB 嘅 iPhone
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug 1": true
